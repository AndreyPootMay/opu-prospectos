name: Release APK and AAB

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check commit message
        id: check
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"
          if echo "$MESSAGE" | grep -iq "release apk"; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build-release:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          CAPACITOR_BUILD: "true"
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CLOUDINARY_URL: ${{ secrets.VITE_CLOUDINARY_URL }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
        run: npm run build:capacitor

      - name: Initialize Android project
        run: |
          if [ ! -d "android/app" ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping add."
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/opu-prospectos-release.keystore
          echo "Keystore written ($(stat -c%s android/app/opu-prospectos-release.keystore) bytes)"

      - name: Resolve Android version metadata
        id: android_version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version_name=${PKG_VERSION}" >> $GITHUB_OUTPUT
          echo "version_code=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Patch versionCode and versionName in build.gradle
        run: |
          VERSION_CODE="${{ steps.android_version.outputs.version_code }}"
          VERSION_NAME="${{ steps.android_version.outputs.version_name }}"
          sed -i "s/versionCode [0-9]\+/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          echo "Patched build.gradle:"
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Build signed APK and AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          KEYSTORE_PATH="$(pwd)/app/opu-prospectos-release.keystore"
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Verify signatures
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          if [ ! -f "$APK" ]; then
            echo "::error::APK not found. Build likely failed."; exit 1
          fi
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          echo "Using $BUILD_TOOLS"
          "$BUILD_TOOLS/apksigner" verify --print-certs "$APK"
          jarsigner -verify -verbose "$AAB" | tail -5

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date +'%Y%m%d-%H%M%S')
          echo "tag=v${VERSION}-${DATE}" >> $GITHUB_OUTPUT
          echo "name=OPU Prospectos v${VERSION}" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          cp android/app/build/outputs/apk/release/app-release.apk    "opu-prospectos-${TAG}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "opu-prospectos-${TAG}.aab"

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## OPU Prospectos — Release firmado

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Build:** ${{ steps.version.outputs.tag }}

            ### Artefactos
            - **APK firmado** (`*.apk`) — instalacion manual / sideload.
            - **AAB firmado** (`*.aab`) — para subir a Google Play Console.
          files: |
            opu-prospectos-${{ steps.version.outputs.tag }}.apk
            opu-prospectos-${{ steps.version.outputs.tag }}.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print download links
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/opu-prospectos-${TAG}.apk"
          AAB_URL="https://github.com/${REPO}/releases/download/${TAG}/opu-prospectos-${TAG}.aab"
          RELEASE_URL="${{ steps.release.outputs.url }}"
          echo "### Download links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Archivo | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK (sideload) | [opu-prospectos-${TAG}.apk](${APK_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB (Google Play) | [opu-prospectos-${TAG}.aab](${AAB_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Release page | [${TAG}](${RELEASE_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "APK: ${APK_URL}"
          echo "AAB: ${AAB_URL}"
          echo "Release: ${RELEASE_URL}"
